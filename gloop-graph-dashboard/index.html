<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>G-Loop Graph Dashboard | CM + RL System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: white;
    }

    header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    .wrap {
      display: flex;
      height: calc(100vh - 70px);
    }

    .panel {
      width: 260px;
      padding: 12px;
      border-right: 1px solid #222;
      overflow-y: auto;
    }

    .panel a {
      color: #4da3ff;
      text-decoration: none;
      display: block;
      margin: 6px 0;
      font-size: 14px;
    }

    .graph {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .link {
      stroke: #444;
      stroke-width: 2;
    }

    .node {
      fill: #4da3ff;
      cursor: pointer;
    }

    .node:hover {
      fill: #ffcc00;
    }

    .label {
      fill: white;
      font-size: 10px;
      font-weight: bold;
      pointer-events: none;
    }

    .label-small {
      fill: white;
      font-size: 8px;
      font-weight: bold;
      pointer-events: none;
    }
  </style>
</head>

<body>

<header>
  <h2>G-Loop Graph Dashboard</h2>
  <small>CM (Co-Mention) + RL (Semantic Relation)</small>
</header>

<div class="wrap">

  <!-- PANEL -->
  <div class="panel">
    <strong>CORE NODES</strong>

    <a href="/gloop-core-system-graph/">Hub System</a>
    <a href="/identity-stamp-system/">Identity Stamp</a>
    <a href="/co-mention-network/">Co-Mention</a>
    <a href="/semantic-relational-graph/">Semantic RL</a>
    <a href="/authority-propagation-rule/">Propagation</a>
    <a href="/node-collapse-rule/">Collapse</a>
    <a href="/graph-density-rule/">Density</a>
    <a href="/gloop-anchor-node-system/">Anchor</a>
    <a href="/node-stability-formula/">Stability</a>
    <a href="/gloop-authority-score-model/">Authority Score</a>
  </div>

  <!-- GRAPH -->
  <div class="graph">

    <svg viewBox="0 0 800 500">

      <!-- LINKS -->
      <line class="link" x1="400" y1="250" x2="200" y2="120"/>
      <line class="link" x1="400" y1="250" x2="600" y2="120"/>
      <line class="link" x1="400" y1="250" x2="200" y2="380"/>
      <line class="link" x1="400" y1="250" x2="600" y2="380"/>
      <line class="link" x1="200" y1="120" x2="600" y2="120"/>
      <line class="link" x1="200" y1="380" x2="600" y2="380"/>

      <!-- HUB -->
      <circle class="node" cx="400" cy="250" r="24"></circle>
      <text x="400" y="255" text-anchor="middle" class="label">HUB</text>

      <!-- STAMP -->
      <circle class="node" cx="200" cy="120" r="16"></circle>
      <text x="200" y="125" text-anchor="middle" class="label-small">S</text>

      <!-- CM -->
      <circle class="node" cx="600" cy="120" r="16"></circle>
      <text x="600" y="125" text-anchor="middle" class="label-small">CM</text>

      <!-- RL -->
      <circle class="node" cx="200" cy="380" r="16"></circle>
      <text x="200" y="385" text-anchor="middle" class="label-small">RL</text>

      <!-- PROPAGATION -->
      <circle class="node" cx="600" cy="380" r="16"></circle>
      <text x="600" y="385" text-anchor="middle" class="label-small">AP</text>

      <!-- ANCHOR -->
      <circle class="node" cx="400" cy="80" r="14"></circle>
      <text x="400" y="85" text-anchor="middle" class="label-small">A</text>

      <!-- COLLAPSE -->
      <circle class="node" cx="400" cy="420" r="14"></circle>
      <text x="400" y="425" text-anchor="middle" class="label-small">CL</text>

    </svg>

  </div>

</div>
<p class="hero-link">
  Kembali ke HOME 
  <a href="https://gloop.my.id">HOME</a>
</p>
</body>
</html>
